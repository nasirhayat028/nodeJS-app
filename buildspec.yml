version: 0.2

# AWS CodeBuild configuration
# Is file mein CI steps define hote hain: dependencies install, checks, aur artifacts.

phases:
  install:
    # Node runtime choose karein (app Node 18+ support karta hai)
    runtime-versions:
      nodejs: 18
    commands:
      - echo "Installing dependencies..."
      # CI ke liye best practice: lock file se exact install
      # Agar kabhi npm ci issue de, temporary npm install use kiya ja sakta hai.
      - npm ci

  build:
    commands:
      - echo "Running checks/build..."
      # test script ho to run hoga, warna skip (error nahi dega)
      - npm run test --if-present
      # build script ho to run hoga, warna skip (aapke project mein abhi build script nahi)
      - npm run build --if-present

  post_build:
    commands:
      - echo "Build finished at $(date)"

artifacts:
  # Kaun se files CodeBuild output artifact mein jayengi
  files:
    - '**/*'
  # Folder structure preserve rahegi
  discard-paths: no
